<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日投資檢查</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base:      #0d1117;
            --bg-surface:   #161b22;
            --bg-elevated:  #1c2230;
            --border:       #21262d;
            --border-dim:   #1a1f29;
            --text-primary:   #e6edf3;
            --text-secondary: #8b949e;
            --text-dim:       #484f58;
            --accent-blue:  #58a6ff;
            --accent-green: #3fb950;
            --accent-red:   #f85149;
            --accent-amber: #d29922;
            --accent-cyan:  #39c5cf;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            font-size: 14px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .mono { font-family: 'IBM Plex Mono', 'Courier New', monospace; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }

        /* ── Sticky header ── */
        .site-header {
            position: sticky; top: 0; z-index: 40;
            background: rgba(22,27,34,0.95);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .header-inner {
            max-width: 1280px; margin: 0 auto;
            padding: 11px 24px;
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .header-brand {
            display: flex; align-items: center; gap: 10px;
        }
        .header-brand-icon {
            width: 30px; height: 30px;
            background: linear-gradient(135deg, rgba(88,166,255,0.15), rgba(57,197,207,0.15));
            border: 1px solid rgba(88,166,255,0.25);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .header-title {
            font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
            color: var(--text-primary);
        }
        #lastUpdateBadge {
            font-size: 11px; color: var(--text-dim);
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            padding: 2px 8px; border-radius: 20px;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 6px 13px; border-radius: 6px;
            font-size: 12.5px; font-weight: 500; line-height: 1;
            cursor: pointer; transition: all 0.14s ease;
            border: 1px solid transparent; white-space: nowrap;
            font-family: 'Noto Sans TC', sans-serif; text-decoration: none;
        }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }
        .btn-ghost {
            background: transparent; color: var(--text-secondary); border-color: var(--border);
        }
        .btn-ghost:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: #30363d; }
        .btn-primary {
            background: var(--accent-blue); color: #0d1117;
            border-color: var(--accent-blue); font-weight: 600;
        }
        .btn-primary:hover { background: #79c0ff; border-color: #79c0ff; }
        .btn-danger {
            background: transparent; color: var(--accent-red);
            border-color: rgba(248,81,73,0.3);
        }
        .btn-danger:hover { background: rgba(248,81,73,0.1); border-color: rgba(248,81,73,0.5); }
        .btn-success {
            background: rgba(63,185,80,0.1); color: var(--accent-green);
            border-color: rgba(63,185,80,0.3);
        }
        .btn-success:hover { background: rgba(63,185,80,0.2); }
        .btn-warning {
            background: rgba(210,153,34,0.1); color: var(--accent-amber);
            border-color: rgba(210,153,34,0.3); cursor: pointer;
        }
        .btn-warning:hover { background: rgba(210,153,34,0.2); }

        /* ── Main content ── */
        .main-inner { max-width: 1280px; margin: 0 auto; padding: 22px 24px; }

        /* ── Progress bar ── */
        .prog-wrap { margin-bottom: 14px; }
        .prog-meta {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 5px;
        }
        .prog-label { font-size: 12px; color: var(--text-secondary); }
        .prog-pct   { font-size: 11px; color: var(--accent-blue); font-family: 'IBM Plex Mono', monospace; }
        .prog-track { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
        .prog-fill  {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 1px; transition: width 0.3s ease;
        }

        /* ── Data card ── */
        .data-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden;
        }
        .table-scroll { overflow-x: auto; }

        /* ── Table ── */
        .data-table { width: 100%; border-collapse: collapse; min-width: 820px; }
        .data-table thead th {
            background: var(--bg-elevated);
            color: var(--text-dim);
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.09em; text-transform: uppercase;
            padding: 9px 16px; text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap; user-select: none;
        }
        .data-table tbody tr.data-row {
            border-bottom: 1px solid var(--border-dim);
            transition: background 0.1s;
        }
        .data-table tbody tr.data-row:last-child { border-bottom: none; }
        .data-table tbody tr.data-row:hover { background: rgba(255,255,255,0.022); }
        .data-table td { padding: 10px 16px; white-space: nowrap; vertical-align: middle; }

        /* ── Category group header ── */
        .cat-group-row td {
            background: linear-gradient(90deg, rgba(28,34,48,0.9), rgba(22,27,34,0.6));
            color: var(--text-dim);
            font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
            padding: 5px 16px;
            border-bottom: 1px solid var(--border);
        }
        .cat-group-inner { display: flex; align-items: center; gap: 7px; }

        /* ── Badges ── */
        .badge {
            display: inline-flex; align-items: center;
            padding: 2px 9px; border-radius: 20px;
            font-size: 11px; font-weight: 500; white-space: nowrap;
        }
        .bdg-low  { background: rgba(63,185,80,0.12);  color: #3fb950; border: 1px solid rgba(63,185,80,0.28); }
        .bdg-high { background: rgba(248,81,73,0.12);  color: #f85149; border: 1px solid rgba(248,81,73,0.28); }
        .bdg-mid  { background: rgba(139,148,158,0.08); color: #8b949e; border: 1px solid rgba(139,148,158,0.15); }
        .bdg-gold { background: rgba(210,153,34,0.12); color: #d29922; border: 1px solid rgba(210,153,34,0.28); }
        .bdg-dead { background: rgba(248,81,73,0.08);  color: #ff7b72; border: 1px solid rgba(248,81,73,0.2); }
        .bdg-none { color: var(--text-dim); border: 1px solid var(--border); background: transparent; }

        /* ── Advice text ── */
        .adv-buy  { color: #3fb950; font-weight: 600; font-size: 13px; }
        .adv-sell { color: #f85149; font-weight: 600; font-size: 13px; }
        .adv-hold { color: var(--text-secondary); font-size: 13px; }
        .adv-err  { color: var(--text-dim); font-style: italic; font-size: 13px; }

        /* ── K-bar ── */
        .k-cell   { display: flex; align-items: center; gap: 8px; }
        .k-track  { width: 56px; height: 4px; border-radius: 2px; background: var(--bg-elevated); overflow: hidden; flex-shrink: 0; }
        .k-fill   { height: 100%; border-radius: 2px; transition: width 0.9s cubic-bezier(0.22,0.61,0.36,1); }
        .k-val    { font-size: 12px; font-family: 'IBM Plex Mono', monospace; color: var(--text-secondary); min-width: 32px; }

        /* ── Code tag ── */
        .code-tag {
            font-family: 'IBM Plex Mono', monospace; font-size: 11px;
            color: var(--text-dim); background: var(--bg-elevated);
            padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border);
            letter-spacing: 0.02em;
        }

        /* ── Price ── */
        .price-val { font-family: 'IBM Plex Mono', monospace; font-size: 13.5px; font-weight: 500; }

        /* ── Stock name link ── */
        .stock-link {
            color: var(--text-primary); text-decoration: none; font-weight: 500; font-size: 13px;
            transition: color 0.12s;
        }
        .stock-link:hover { color: var(--accent-blue); }

        /* ── Timestamp ── */
        .ts { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--text-dim); }

        /* ── Spinner ── */
        @keyframes _spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 14px; height: 14px; flex-shrink: 0;
            border: 2px solid var(--border); border-top-color: var(--accent-blue);
            border-radius: 50%; animation: _spin 0.7s linear infinite;
        }
        .spinner-lg { width: 28px; height: 28px; border-width: 3px; }

        /* ── Skeleton shimmer ── */
        @keyframes _shimmer {
            0%   { background-position: -500px 0; }
            100% { background-position: 500px 0; }
        }
        .skel {
            display: inline-block;
            background: linear-gradient(90deg, var(--bg-elevated) 25%, #212940 50%, var(--bg-elevated) 75%);
            background-size: 500px 100%;
            animation: _shimmer 1.4s ease-in-out infinite;
            border-radius: 4px;
        }

        /* ── Row fade in ── */
        @keyframes _rowIn {
            from { opacity: 0; transform: translateY(3px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .row-in { animation: _rowIn 0.2s ease forwards; }

        /* ── Dot colors for categories ── */
        .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
        .dot-1 { background: var(--accent-cyan); }
        .dot-2 { background: var(--accent-blue); }
        .dot-3 { background: var(--accent-amber); }
        .dot-4 { background: #bc8cff; }

        /* ── Footer note ── */
        .footer-note {
            display: flex; align-items: center; gap: 5px;
            margin-top: 12px; font-size: 11px; color: var(--text-dim);
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 50;
            background: rgba(0,0,0,0.68);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center; padding: 16px;
        }
        .modal-box {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 100%; max-width: 660px; max-height: 88vh;
            display: flex; flex-direction: column;
            box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
        }
        .modal-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 22px; border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .modal-head h2 {
            font-size: 14px; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
        }
        .modal-close {
            width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; cursor: pointer;
            color: var(--text-secondary); font-size: 16px; line-height: 1;
            transition: all 0.12s; border: 1px solid transparent; background: transparent;
        }
        .modal-close:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border); }
        .modal-body { overflow-y: auto; flex: 1; }
        .modal-form {
            padding: 14px 22px; border-top: 1px solid var(--border);
            background: var(--bg-elevated); flex-shrink: 0;
        }
        .modal-form-label {
            font-size: 10px; font-weight: 700; color: var(--text-dim);
            letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 10px;
            display: block;
        }
        .modal-form-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }
        .field-group { display: flex; flex-direction: column; gap: 4px; }
        .field-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.04em; }
        .modal-footer {
            padding: 12px 22px; border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            flex-shrink: 0;
        }

        /* ── Form controls ── */
        .form-inp, .form-sel {
            background: var(--bg-surface); border: 1px solid var(--border);
            color: var(--text-primary); border-radius: 6px;
            padding: 7px 11px; font-size: 12.5px; font-family: inherit; outline: none;
            transition: border-color 0.14s, box-shadow 0.14s;
        }
        .form-inp:focus, .form-sel:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88,166,255,0.12);
        }
        .form-inp::placeholder { color: var(--text-dim); }
        .form-sel option { background: var(--bg-elevated); }
        .form-err { font-size: 11px; color: var(--accent-red); margin-top: 6px; }

        /* ── Settings list ── */
        .set-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 22px; border-bottom: 1px solid var(--border-dim); gap: 10px;
            transition: background 0.1s;
        }
        .set-item:last-child { border-bottom: none; }
        .set-item:hover { background: rgba(255,255,255,0.02); }
        .set-item-info { display: flex; align-items: center; gap: 9px; min-width: 0; overflow: hidden; }
        .set-item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .set-item-cat  { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
        .set-item-btns { display: flex; gap: 4px; flex-shrink: 0; }
    </style>
</head>
<body>

    <!-- ════════ Header ════════ -->
    <header class="site-header">
        <div class="header-inner">
            <div class="header-brand">
                <div class="header-brand-icon">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
                        <polyline points="16 7 22 7 22 13"/>
                    </svg>
                </div>
                <span class="header-title">每日投資檢查</span>
                <span id="lastUpdateBadge" style="display:none;"></span>
            </div>
            <div style="display:flex;gap:7px;align-items:center;">
                <button id="refreshBtn" class="btn btn-ghost" onclick="loadData()">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                    重新整理
                </button>
                <button class="btn btn-ghost" onclick="openSettings()">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    管理標的
                </button>
            </div>
        </div>
    </header>

    <!-- ════════ Main ════════ -->
    <main class="main-inner">

        <!-- Loading progress bar -->
        <div id="loadingProgress" class="prog-wrap" style="display:none;">
            <div class="prog-meta">
                <span id="progLabel" class="prog-label"></span>
                <span id="progPct" class="prog-pct"></span>
            </div>
            <div class="prog-track">
                <div id="progBar" class="prog-fill" style="width:0%"></div>
            </div>
        </div>

        <div class="data-card">
            <div class="table-scroll">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>標的名稱</th>
                            <th>代號</th>
                            <th>股價</th>
                            <th>K 值</th>
                            <th>KD 狀態</th>
                            <th>位置</th>
                            <th>操作建議</th>
                            <th>更新時間</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable">
                        <tr>
                            <td colspan="8" style="text-align:center;padding:52px 0;">
                                <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
                                    <div class="spinner spinner-lg"></div>
                                    <span style="color:var(--text-secondary);font-size:12.5px;">正在取得最新行情並計算 KD 值…</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="footer-note">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            數據來源：Yahoo Finance API。KD 採 9 日計算參數，KD 狀態採近似判斷法。
        </div>
    </main>

    <!-- ════════ Settings Modal ════════ -->
    <div id="settingsModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">

            <div class="modal-head">
                <h2>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    管理股票標的
                </h2>
                <button class="modal-close" onclick="closeSettings()">✕</button>
            </div>

            <div class="modal-body">
                <div id="settingsList"></div>
            </div>

            <!-- 新增 / 編輯表單 -->
            <div class="modal-form">
                <span id="formTitle" class="modal-form-label">新增標的</span>
                <div class="modal-form-row">
                    <div class="field-group">
                        <span class="field-label">代號</span>
                        <input id="inputSymbol" type="text" placeholder="如 0050 或 ^TWII"
                            class="form-inp" style="width:140px;"
                            onkeydown="if(event.key==='Enter')submitTargetForm()" />
                    </div>
                    <div class="field-group">
                        <span class="field-label">名稱</span>
                        <input id="inputName" type="text" placeholder="如 元大台灣50"
                            class="form-inp" style="width:155px;"
                            onkeydown="if(event.key==='Enter')submitTargetForm()" />
                    </div>
                    <div class="field-group">
                        <span class="field-label">類別</span>
                        <select id="inputCategory" class="form-sel">
                            <option value="台灣市值型 ETF">台灣市值型 ETF</option>
                            <option value="國際市值型 ETF">國際市值型 ETF</option>
                            <option value="美債券 ETF">美債券 ETF</option>
                            <option value="短線操作（個股）">短線操作（個股）</option>
                        </select>
                    </div>
                    <button id="submitBtn" class="btn btn-primary" onclick="submitTargetForm()">新增</button>
                    <button id="cancelEditBtn" class="btn btn-ghost" onclick="cancelEdit()" style="display:none;">取消</button>
                </div>
                <p id="formError" class="form-err" style="display:none;"></p>
            </div>

            <div class="modal-footer">

                    </button>
                    <label class="btn btn-warning">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>

            </div>

    </div>

    <script>
        // ============================================================
        // 預設標的 + localStorage 讀寫
        // ============================================================
        const DEFAULT_TARGETS = [
            { category: '台灣市值型 ETF', name: '台灣大盤(加權指數)', symbol: '^TWII', apiSymbol: '^TWII', step: 1 },
            { category: '國際市值型 ETF', name: '元大 S&P500', symbol: '00646', apiSymbol: '00646.TW', step: 2 },
            { category: '國際市值型 ETF', name: '富邦歐洲', symbol: '00709', apiSymbol: '00709.TW', step: 2 },
            { category: '國際市值型 ETF', name: '元大日經', symbol: '00661', apiSymbol: '00661.TW', step: 2 },
            { category: '國際市值型 ETF', name: '國泰新興市場', symbol: '00736', apiSymbol: '00736.TW', step: 2 },
            { category: '美債券 ETF', name: '元大美債1-3年', symbol: '00719B', apiSymbol: '00719B.TWO', step: 3 },
            { category: '美債券 ETF', name: '國泰US短期公債', symbol: '00865B', apiSymbol: '00865B.TW', step: 3 },
            { category: '短線操作（個股）', name: '台積電', symbol: '2330', apiSymbol: '2330.TW', step: 4 },
            { category: '短線操作（個股）', name: '鴻海', symbol: '2317', apiSymbol: '2317.TW', step: 4 },
            { category: '短線操作（個股）', name: '廣達', symbol: '2382', apiSymbol: '2382.TW', step: 4 },
            { category: '短線操作（個股）', name: '緯創', symbol: '3231', apiSymbol: '3231.TW', step: 4 },
            { category: '短線操作（個股）', name: '茂順', symbol: '9942', apiSymbol: '9942.TW', step: 4 },
        ];

        const STORAGE_KEY = 'stockTargets';

        function loadTargets() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) return JSON.parse(saved);
            } catch (e) {
                console.warn('讀取 localStorage 失敗，使用預設標的', e);
            }
            return JSON.parse(JSON.stringify(DEFAULT_TARGETS));
        }

        function saveTargets() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(targets));
        }

        let targets = loadTargets();

        // KD 計算函數 (9日)
        function calculateKD(highs, lows, closes, period = 9) {
            let k = 50, d = 50;
            let result = [];

            for (let i = 0; i < closes.length; i++) {
                if (i < period - 1 || closes[i] === null) {
                    result.push({ k: 50, d: 50 });
                    continue;
                }

                let currentHighs = highs.slice(i - period + 1, i + 1).filter(v => v !== null);
                let currentLows = lows.slice(i - period + 1, i + 1).filter(v => v !== null);
                
                if (currentHighs.length === 0 || currentLows.length === 0) {
                    result.push({ k: k, d: d });
                    continue;
                }

                let hh = Math.max(...currentHighs);
                let ll = Math.min(...currentLows);
                let close = closes[i];

                let rsv = (hh === ll) ? k : ((close - ll) / (hh - ll)) * 100;
                k = (2 / 3) * k + (1 / 3) * rsv;
                d = (2 / 3) * d + (1 / 3) * k;

                result.push({ k: k, d: d });
            }
            return result;
        }

        // 判斷邏輯
        function analyzeData(step, k, kdCross) {
            let location = '中性';
            if (k < 20) location = '低點';
            if (k > 80) location = '高點';

            let advice = '觀望';
            
            switch(step) {
                case 1:
                    if (k < 20) advice = '買進台灣市值型 ETF';
                    else if (k > 80) advice = '賣出台灣市值型 ETF';
                    break;
                case 2:
                case 3:
                    if (k < 20) advice = '可買進';
                    else if (k > 80) advice = '可賣出';
                    break;
                case 4:
                    if (k < 20) {
                        advice = kdCross === '黃金交叉' ? '全買' : '部分買進(1/2資金)';
                    } else if (k > 80) {
                        advice = kdCross === '死亡交叉' ? '全賣' : '部分賣出(1/2股票)';
                    }
                    break;
            }

            return { location, advice };
        }

        // 記憶當前穩定運作的代理伺服器索引
        let currentProxyIndex = 0;

        async function fetchYahooData(symbol) {
            // 【關鍵修正】: 改用「5分鐘級別」的快取鍵，取代原本毫秒級的隨機字串。
            // 這樣免費代理伺服器就可以利用快取來回應，不再因為頻繁穿透請求而被 Yahoo 徹底封鎖 IP。
            const cacheKey = Math.floor(new Date().getTime() / 300000); 
            
            const endpoints = [
                `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=3mo&_=${cacheKey}`,
                `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=3mo&_=${cacheKey}`
            ];
            
            // 代理伺服器清單（依可靠度排序；sticky proxy 機制會記住上次成功的）
            const proxyGenerators = [
                { id: 'corsproxy_io',   build: (url) => `https://corsproxy.io/?${encodeURIComponent(url)}` },
                { id: 'allorigins_raw', build: (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
                { id: 'allorigins_get', build: (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}` },
                { id: 'codetabs',       build: (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}` },
            ];

            let lastError;
            
            for (let endpoint of endpoints) {
                for (let attempt = 0; attempt < proxyGenerators.length; attempt++) {
                    // 確保優先使用上次成功運作的代理器 (Sticky Proxy 機制)
                    let proxyIndex = (currentProxyIndex + attempt) % proxyGenerators.length;
                    let proxy = proxyGenerators[proxyIndex];
                    let proxyUrl = proxy.build(endpoint);
                    
                    try {
                        const controller = new AbortController();
                        // 【關鍵修正】: 將連線超時從 12 秒延長至 18 秒，以容忍免費代理伺服器的冷啟動延遲。
                        const timeoutId = setTimeout(() => controller.abort(), 18000);
                        
                        let response;
                        try {
                            response = await fetch(proxyUrl, { 
                                signal: controller.signal,
                                headers: { 'Accept': 'application/json' },
                                cache: 'no-store' // 確保瀏覽器不快取，交由代理伺服器本身處理快取
                            });
                        } catch (fetchErr) {
                            // 捕捉 Failed to fetch (瀏覽器拒絕連線或 DNS 失敗)
                            throw new Error(`NETWORK_ERROR (${fetchErr.name || fetchErr.message})`);
                        } finally {
                            clearTimeout(timeoutId);
                        }
                        
                        if (response.status === 404) throw new Error("NOT_FOUND");
                        
                        let text = await response.text();
                        
                        // 針對 allorigins /get 的特例解析，安全提取 contents
                        if (proxy.id === 'allorigins_get') {
                            let jsonWrap;
                            try { 
                                jsonWrap = JSON.parse(text); 
                            } catch (e) { 
                                throw new Error("INVALID_PROXY_JSON"); 
                            }
                            if (jsonWrap.status && jsonWrap.status.http_code === 404) throw new Error("NOT_FOUND");
                            text = jsonWrap.contents || "";
                        }
                        
                        // 過濾各種非預期的純文字錯誤或是 HTML (代表被阻擋或 Rate Limit)
                        if (!text || text.trim().startsWith('<') || text.includes('Too Many Requests') || text.startsWith('Edge:')) {
                            throw new Error("PROXY_BLOCKED_OR_RATE_LIMIT");
                        }
                        
                        let data;
                        try {
                            data = JSON.parse(text);
                        } catch (e) {
                            throw new Error("INVALID_YAHOO_JSON");
                        }
                        
                        if (data && data.chart && data.chart.result) {
                            // 成功！將此代理設為首選，下次直接從它開始
                            currentProxyIndex = proxyIndex;
                            return data;
                        } else {
                            throw new Error("INVALID_YAHOO_FORMAT");
                        }
                    } catch (e) {
                        lastError = e;
                        console.warn(`[嘗試 ${proxy.id} 失敗]: ${e.message}`);
                        
                        if (e.message === "NOT_FOUND") {
                            throw e; // 標的真的不存在，直接拋出不浪費時間嘗試其他代理
                        }
                        
                        // 失敗後稍等 1.5 秒再試下一個代理，避免瞬間發出過多錯誤請求
                        await new Promise(resolve => setTimeout(resolve, 1500));
                    }
                }
            }
            throw lastError || new Error("All endpoints and proxies failed");
        }

        async function fetchStockData(item) {
            try {
                let parsed;
                try {
                    parsed = await fetchYahooData(item.apiSymbol);
                } catch (error) {
                    if (error.message === "NOT_FOUND" && item.apiSymbol.includes('.TWO')) {
                        parsed = await fetchYahooData(`${item.symbol}.TW`);
                    } else {
                        throw error;
                    }
                }

                const result = parsed.chart.result[0];
                const quotes = result.indicators.quote[0];
                
                // 取得最新股價
                const validCloses = quotes.close.filter(v => v !== null);
                const currentPrice = validCloses.length > 0 ? validCloses[validCloses.length - 1] : 'N/A';
                const formattedPrice = currentPrice !== 'N/A' ? currentPrice.toLocaleString('en-US', {maximumFractionDigits: 2}) : 'N/A';

                const kdData = calculateKD(quotes.high, quotes.low, quotes.close);
                const last = kdData[kdData.length - 1];
                const prev = kdData[kdData.length - 2];

                let kVal = last.k;
                let kdCross = '無';
                let remark = '';
                
                if (item.step !== 1) { 
                    // 近似判斷法邏輯
                    if (prev) {
                        const kUp = last.k > prev.k;
                        const kDown = last.k < prev.k;
                        const dDownOrFlat = last.d <= prev.d;
                        const dUpOrFlat = last.d >= prev.d;

                        if (last.k > last.d && kUp && dDownOrFlat) {
                            kdCross = '黃金交叉';
                        } else if (last.k < last.d && kDown && dUpOrFlat) {
                            kdCross = '死亡交叉';
                        }
                    }
                    remark = 'KD狀態採近似判斷';
                } else {
                    kdCross = '—';
                }

                const analysis = analyzeData(item.step, kVal, kdCross);
                
                // 取得目前時間戳
                const now = new Date();
                const _pad = n => String(n).padStart(2,'0');
                const updateTime = `${now.getMonth()+1}/${_pad(now.getDate())} ${_pad(now.getHours())}:${_pad(now.getMinutes())}`;

                return {
                    ...item,
                    price: formattedPrice,
                    kVal: kVal.toFixed(2),
                    kdCross: kdCross,
                    location: analysis.location,
                    advice: analysis.advice,
                    remark: remark,
                    updateTime: updateTime,
                    status: 'success'
                };
            } catch (error) {
                // 將 console.error 改為 console.warn 以免造成不必要的紅字恐慌
                console.warn(`獲取 ${item.symbol} 失敗:`, error.message || error);
                
                // 取得目前時間戳
                const now = new Date();
                const _pad2 = n => String(n).padStart(2,'0');
                const updateTime = `${now.getMonth()+1}/${_pad2(now.getDate())} ${_pad2(now.getHours())}:${_pad2(now.getMinutes())}`;
                
                return {
                    ...item,
                    price: 'N/A',
                    kVal: 'N/A',
                    kdCross: 'N/A',
                    location: 'N/A',
                    advice: '請你自行查詢',
                    remark: '網路或伺服器阻擋',
                    updateTime: updateTime,
                    status: 'error'
                };
            }
        }

        function getYahooLink(symbol) {
            const encodeSym = symbol === '^TWII' ? '%5ETWII' : symbol;
            return `https://tw.stock.yahoo.com/quote/${encodeSym}/technical-analysis`;
        }

        function kBarColor(k) {
            if (k < 20) return '#3fb950';
            if (k > 80) return '#f85149';
            return '#d29922';
        }

        function locationBadge(loc) {
            if (loc === '低點') return `<span class="badge bdg-low">低點</span>`;
            if (loc === '高點') return `<span class="badge bdg-high">高點</span>`;
            if (loc === '中性') return `<span class="badge bdg-mid">中性</span>`;
            return `<span style="color:var(--text-dim);">—</span>`;
        }

        function kdBadge(kd) {
            if (kd === '黃金交叉') return `<span class="badge bdg-gold">↗ 黃金交叉</span>`;
            if (kd === '死亡交叉') return `<span class="badge bdg-dead">↘ 死亡交叉</span>`;
            if (kd === '無')       return `<span class="badge bdg-none">無</span>`;
            return `<span style="color:var(--text-dim);">${escapeHtml(kd)}</span>`;
        }

        function adviceHtml(advice, status) {
            if (status === 'error') return `<span class="adv-err">無法取得</span>`;
            const isBuy  = advice.includes('買');
            const isSell = advice.includes('賣');
            if (isBuy)  return `<span class="adv-buy">▲ ${escapeHtml(advice)}</span>`;
            if (isSell) return `<span class="adv-sell">▼ ${escapeHtml(advice)}</span>`;
            return `<span class="adv-hold">— ${escapeHtml(advice)}</span>`;
        }

        function renderRow(row) {
            const tr = document.createElement('tr');
            tr.className = 'data-row row-in';
            tr.id = `row-${row.symbol}`;

            const kNum = parseFloat(row.kVal);
            const kCellHtml = !isNaN(kNum)
                ? `<div class="k-cell">
                       <div class="k-track"><div class="k-fill" style="width:${Math.min(100,Math.max(0,kNum)).toFixed(1)}%;background:${kBarColor(kNum)};"></div></div>
                       <span class="k-val">${row.kVal}</span>
                   </div>`
                : `<span style="color:var(--text-dim);">—</span>`;

            const updateTime = row.updateTime || '';

            tr.innerHTML = `
                <td><a href="${getYahooLink(row.symbol)}" target="_blank" rel="noopener" class="stock-link">${escapeHtml(row.name)}</a></td>
                <td><span class="code-tag">${escapeHtml(row.symbol)}</span></td>
                <td><span class="price-val" style="color:${row.status==='error'?'var(--text-dim)':'var(--text-primary)'};">${escapeHtml(row.price)}</span></td>
                <td>${kCellHtml}</td>
                <td>${kdBadge(row.kdCross)}</td>
                <td>${locationBadge(row.location)}</td>
                <td>${adviceHtml(row.advice, row.status)}</td>
                <td><span class="ts">${escapeHtml(updateTime)}</span></td>
            `;
            return tr;
        }

        function renderSkeletonRow() {
            const tr = document.createElement('tr');
            tr.className = 'data-row';
            tr.innerHTML = `
                <td><span class="skel" style="width:88px;height:13px;"></span></td>
                <td><span class="skel" style="width:52px;height:20px;border-radius:4px;"></span></td>
                <td><span class="skel" style="width:60px;height:13px;"></span></td>
                <td><span class="skel" style="width:64px;height:4px;border-radius:2px;"></span></td>
                <td><span class="skel" style="width:76px;height:20px;border-radius:20px;"></span></td>
                <td><span class="skel" style="width:44px;height:20px;border-radius:20px;"></span></td>
                <td><span class="skel" style="width:80px;height:13px;"></span></td>
                <td><span class="skel" style="width:72px;height:11px;"></span></td>
            `;
            return tr;
        }

        // Map category name → dot class (1–4)
        const CATEGORY_DOT = {
            '台灣市值型 ETF':   'dot-1',
            '國際市值型 ETF':   'dot-2',
            '美債券 ETF':       'dot-3',
            '短線操作（個股）': 'dot-4',
        };

        async function loadData() {
            const tableBody  = document.getElementById('dataTable');
            const progWrap   = document.getElementById('loadingProgress');
            const progBar    = document.getElementById('progBar');
            const progLabel  = document.getElementById('progLabel');
            const progPct    = document.getElementById('progPct');
            const refreshBtn = document.getElementById('refreshBtn');
            const lastBadge  = document.getElementById('lastUpdateBadge');

            // Disable refresh button while loading
            if (refreshBtn) refreshBtn.disabled = true;
            if (lastBadge)  lastBadge.style.display = 'none';

            // Show progress bar
            progWrap.style.display = 'block';
            progBar.style.width = '0%';
            progLabel.textContent = '正在取得資料…';
            progPct.textContent = '0%';

            // Group targets by category (preserve order)
            const grouped = {};
            const catOrder = [];
            targets.forEach(t => {
                if (!grouped[t.category]) {
                    grouped[t.category] = [];
                    catOrder.push(t.category);
                }
                grouped[t.category].push(t);
            });

            // Build skeleton rows — one group-header + N skeleton rows per category
            tableBody.innerHTML = '';
            const skeletonMap = {};
            catOrder.forEach(cat => {
                // Group header
                const dotCls = CATEGORY_DOT[cat] || 'dot-1';
                const headerTr = document.createElement('tr');
                headerTr.className = 'cat-group-row';
                headerTr.innerHTML = `<td colspan="8"><div class="cat-group-inner"><span class="dot ${dotCls}"></span>${escapeHtml(cat)}</div></td>`;
                tableBody.appendChild(headerTr);

                grouped[cat].forEach(t => {
                    const skelTr = renderSkeletonRow();
                    skelTr.id = `row-${t.symbol}`;
                    tableBody.appendChild(skelTr);
                    skeletonMap[t.symbol] = skelTr;
                });
            });

            let loadedCount = 0;
            const totalCount = targets.length;

            // Fetch all in parallel; replace skeleton on completion
            const promises = targets.map(async (target) => {
                const res = await fetchStockData(target);
                loadedCount++;

                const pct = Math.round((loadedCount / totalCount) * 100);
                progBar.style.width = pct + '%';
                progPct.textContent = pct + '%';
                progLabel.textContent = `已完成 ${loadedCount} / ${totalCount}`;

                const newTr = renderRow(res);
                const oldTr = skeletonMap[target.symbol];
                if (oldTr) oldTr.replaceWith(newTr);

                return res;
            });

            await Promise.all(promises);

            // Done
            progWrap.style.display = 'none';
            if (refreshBtn) refreshBtn.disabled = false;

            const now = new Date();
            const pad = n => String(n).padStart(2, '0');
            const stamp = `${now.getMonth()+1}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
            if (lastBadge) { lastBadge.textContent = `更新 ${stamp}`; lastBadge.style.display = 'inline-block'; }
        }

        window.onload = loadData;

        // ============================================================
        // 自動推導輔助
        // ============================================================
        const CATEGORY_STEP_MAP = {
            '台灣市值型 ETF': 1,
            '國際市值型 ETF': 2,
            '美債券 ETF': 3,
            '短線操作（個股）': 4,
        };

        function deriveStep(category) {
            return CATEGORY_STEP_MAP[category] || 4;
        }

        function deriveApiSymbol(symbol) {
            return symbol.startsWith('^') ? symbol : `${symbol}.TW`;
        }

        // ============================================================
        // 設定 Modal 功能
        // ============================================================
        let editingSymbol = null;

        function openSettings() {
            const modal = document.getElementById('settingsModal');
            modal.style.display = 'flex';
            renderSettingsList();
        }

        function closeSettings() {
            document.getElementById('settingsModal').style.display = 'none';
            cancelEdit();
        }

        function renderSettingsList() {
            const list = document.getElementById('settingsList');
            if (targets.length === 0) {
                list.innerHTML = '<div style="padding:32px 22px;text-align:center;color:var(--text-dim);font-size:13px;">尚無任何標的，請從下方新增</div>';
                return;
            }
            list.innerHTML = targets.map((t) => {
                const dotCls = CATEGORY_DOT[t.category] || 'dot-1';
                return `<div class="set-item">
                    <div class="set-item-info">
                        <span class="dot ${dotCls}" style="flex-shrink:0;"></span>
                        <span class="set-item-name">${escapeHtml(t.name)}</span>
                        <span class="code-tag">${escapeHtml(t.symbol)}</span>
                        <span class="set-item-cat">${escapeHtml(t.category)}</span>
                    </div>
                    <div class="set-item-btns">
                        <button data-sym="${escapeAttr(t.symbol)}" onclick="editTarget(this.dataset.sym)" class="btn btn-ghost" style="padding:4px 10px;font-size:12px;">編輯</button>
                        <button data-sym="${escapeAttr(t.symbol)}" onclick="deleteTarget(this.dataset.sym)" class="btn btn-danger" style="padding:4px 10px;font-size:12px;">刪除</button>
                    </div>
                </div>`;
            }).join('');
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function escapeAttr(str) {
            return String(str).replace(/"/g, '&quot;');
        }

        function editTarget(symbol) {
            const target = targets.find(t => t.symbol === symbol);
            if (!target) return;
            editingSymbol = symbol;
            document.getElementById('inputSymbol').value = target.symbol;
            document.getElementById('inputName').value = target.name;
            document.getElementById('inputCategory').value = target.category;
            document.getElementById('formTitle').textContent = `✏ 編輯：${target.name}`;
            document.getElementById('submitBtn').textContent = '更新';
            document.getElementById('cancelEditBtn').style.display = '';
            document.getElementById('formError').style.display = 'none';
            document.getElementById('inputSymbol').focus();
        }

        function cancelEdit() {
            editingSymbol = null;
            document.getElementById('inputSymbol').value = '';
            document.getElementById('inputName').value = '';
            document.getElementById('inputCategory').value = '台灣市值型 ETF';
            document.getElementById('formTitle').textContent = '新增股票標的';
            document.getElementById('submitBtn').textContent = '新增';
            document.getElementById('cancelEditBtn').style.display = 'none';
            document.getElementById('formError').style.display = 'none';
        }

        function deleteTarget(symbol) {
            targets = targets.filter(t => t.symbol !== symbol);
            renderSettingsList();
        }

        function submitTargetForm() {
            const symbol = document.getElementById('inputSymbol').value.trim().toUpperCase();
            const name = document.getElementById('inputName').value.trim();
            const category = document.getElementById('inputCategory').value;
            const errEl = document.getElementById('formError');

            if (!symbol || !name) {
                errEl.textContent = '請填寫代號與名稱';
                errEl.style.display = '';
                return;
            }

            // 新增模式：檢查重複代號
            if (!editingSymbol && targets.some(t => t.symbol === symbol)) {
                errEl.textContent = `代號「${symbol}」已存在，請勿重複新增`;
                errEl.style.display = '';
                return;
            }

            const newTarget = {
                category,
                name,
                symbol,
                apiSymbol: deriveApiSymbol(symbol),
                step: deriveStep(category),
            };

            if (editingSymbol) {
                const idx = targets.findIndex(t => t.symbol === editingSymbol);
                if (idx !== -1) targets[idx] = newTarget;
            } else {
                targets.push(newTarget);
            }

            cancelEdit();
            renderSettingsList();
            errEl.style.display = 'none';
        }

        function saveSettings() {
            saveTargets();
            closeSettings();
            loadData();
        }

        // ============================================================
        // 匯出 / 匯入 JSON 備份
        // ============================================================
        function exportTargets() {
            const json = JSON.stringify(targets, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'stock-targets.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importTargets(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!Array.isArray(data) || data.length === 0) throw new Error('格式不正確，需為非空陣列');
                    for (const item of data) {
                        if (!item.symbol || !item.name || !item.category) throw new Error('缺少必要欄位（symbol、name、category）');
                        // 相容舊版匯出（補齊自動推導欄位）
                        if (!item.step) item.step = deriveStep(item.category);
                        if (!item.apiSymbol) item.apiSymbol = deriveApiSymbol(item.symbol);
                    }
                    targets = data;
                    saveTargets();
                    renderSettingsList();
                    alert(`✅ 匯入成功，共載入 ${data.length} 筆標的`);
                } catch (err) {
                    alert(`❌ 匯入失敗：${err.message}`);
                }
                // 重設 input，讓同一檔案可再次觸發 onchange
                event.target.value = '';
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
